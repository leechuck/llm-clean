# llm-clean Docker Compose
#
# Full reproduction (requires OPENROUTER_API_KEY in environment or .env on host):
#   OPENROUTER_API_KEY=sk-xxx docker compose run --rm reproduce
#   docker compose --env-file .env run --rm reproduce
#
# Specific step only:
#   OPENROUTER_API_KEY=sk-xxx docker compose run --rm reproduce --multi-critic
#
# Interactive shell:
#   OPENROUTER_API_KEY=sk-xxx docker compose run --rm shell

services:

  # Full reproduction: runs bash reproduce.sh --all
  reproduce:
    build: .
    # Pass the API key from the host environment — never hardcode it here.
    # Set it with:  export OPENROUTER_API_KEY=sk-xxx
    # or:          OPENROUTER_API_KEY=sk-xxx docker compose run --rm reproduce
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:?OPENROUTER_API_KEY must be set}
    volumes:
      # Mount output so results persist after the container exits
      - ./output:/app/output
      - ./data:/app/data
      - ./docs/reports:/app/docs/reports
    # Override CMD to run specific steps, e.g.:
    #   docker compose run --rm reproduce --zeroshot --agentic
    command: ["--all"]

  # Interactive shell for exploration / debugging
  shell:
    build: .
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      - ./output:/app/output
      - ./data:/app/data
      - ./docs/reports:/app/docs/reports
    entrypoint: bash
    stdin_open: true
    tty: true
